<svg width="240" height="40" viewBox="0 0 240 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Bold URL-style developer protocol -->
  <g transform="translate(0, 0)">
    <!-- Each element positioned separately for precise control -->
    <text y="24" 
          font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" 
          font-size="18" 
          font-weight="700"
          fill="#0f172a" opacity="0.4">&lt;</text>
    
    <text x="12" y="24" 
          font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" 
          font-size="18" 
          font-weight="500"
          letter-spacing="-0.02em"
          fill="#0f172a">developer</text>
    
    <text x="106" y="24" 
          font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" 
          font-size="18" 
          font-weight="700"
          fill="#0f172a" opacity="0.4">://</text>
    
    <text x="136" y="24" 
          font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" 
          font-size="18" 
          font-weight="800"
          letter-spacing="-0.02em"
          fill="#0f172a">toolkit</text>
    
    <text x="210" y="24" 
          font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" 
          font-size="18" 
          font-weight="700"
          fill="#0f172a" opacity="0.4">&gt;</text>
  </g>
</svg>